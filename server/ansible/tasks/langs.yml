---
# -----------------------------
# NODE.JS & NPM (via NVM)
# -----------------------------
# 1. Download installer safely (fails if network/URL is wrong)
- name: Download NVM installer
  become: no
  get_url:
    url: https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh
    dest: /tmp/nvm_install.sh
    mode: "0755"
  when: not nvm_stat.stat.exists

# 2. Run the installer
- name: Run NVM installer
  become: no
  shell: /tmp/nvm_install.sh
  args:
    creates: "{{ home }}/.nvm/nvm.sh"
  when: not nvm_stat.stat.exists

# 3. Clean up
- name: Remove NVM installer
  become: no
  file:
    path: /tmp/nvm_install.sh
    state: absent
  when: not nvm_stat.stat.exists

# 4. Install Node (This is your existing task, essentially unchanged)
- name: Install Node.js LTS
  become: no
  shell: |
    . {{ home }}/.nvm/nvm.sh
    nvm install --lts
    nvm use --lts
    nvm alias default 'lts/*'
  args:
    executable: /bin/bash
  when: not nvm_stat.stat.exists

# -----------------------------
# GOLANG
# -----------------------------
- name: Check if Go is installed
  stat:
    path: /usr/local/go/bin/go
  register: go_stat

- name: Download and Install Go
  when: not go_stat.stat.exists
  become: yes
  block:
    - name: Download Go Tarball
      get_url:
        url: "https://go.dev/dl/go1.22.2.linux-amd64.tar.gz"
        dest: "/tmp/go.tar.gz"

    - name: Extract Go to /usr/local
      unarchive:
        src: "/tmp/go.tar.gz"
        dest: "/usr/local"
        remote_src: yes

    - name: Cleanup Go Tarball
      file:
        path: "/tmp/go.tar.gz"
        state: absent
