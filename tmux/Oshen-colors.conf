# -----------------------------------------------------------------------------
# Oshen tmux palette
# Drop-in replacement for the CUSTOM PALETTE block in tmux.conf
# -----------------------------------------------------------------------------
set -g @thm_bg       "#0e1117"   # main background
set -g @thm_fg       "#f1faee"   # foreground / text
set -g @thm_red      "#e05c6e"   # errors, git deleted
set -g @thm_green    "#a8c97f"   # strings, git added
set -g @thm_blue     "#abdadc"   # functions (teal)
set -g @thm_yellow   "#ffb703"   # keywords, modified
set -g @thm_mauve    "#c3a0d8"   # types, hints (lavender)
set -g @thm_pink     "#c3a0d8"   # mapped lavender to pink slot
set -g @thm_peach    "#e8944a"   # warnings (orange)
set -g @thm_rosewater "#8899aa"  # dimmed fg (inactive window text)
set -g @thm_overlay_0 "#3d5570"  # borders / separators (overlay0)
set -g @thm_surface_0 "#090c12"  # popup / panel background
set -g @thm_test     "#457b9d"   # steel blue (statusline accents)
